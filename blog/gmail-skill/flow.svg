<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Flow diagram: the Gmail API skill and the Chrome extension hand off to each other to complete an online flight check-in">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#7dd3fc" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <marker id="ac" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#7dd3fc"/>
    </marker>
    <marker id="ay" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#fef08a"/>
    </marker>
  </defs>

  <rect width="1200" height="630" fill="#0a1628"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g font-family="IBM Plex Mono, Menlo, DejaVu Sans Mono, monospace">

    <!-- header -->
    <text x="28" y="46" fill="#e0f2fe" font-size="21" font-weight="600" letter-spacing="1.2">ONLINE FLIGHT CHECK-IN, RUN BY AN AGENT</text>
    <text x="28" y="72" fill="#7dd3fc" font-size="12.5" letter-spacing="0.8">Gmail API skill  +  Chrome extension  -  neither one can do this alone</text>
    <line x1="28" y1="88" x2="1172" y2="88" stroke="#7dd3fc" stroke-opacity="0.45" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- lane bands -->
    <rect x="28" y="112" width="1144" height="126" fill="#7dd3fc" fill-opacity="0.035" stroke="#7dd3fc" stroke-opacity="0.22"/>
    <rect x="28" y="300" width="1144" height="126" fill="#fef08a" fill-opacity="0.035" stroke="#fef08a" stroke-opacity="0.22"/>

    <!-- lane labels -->
    <text x="44" y="140" fill="#7dd3fc" font-size="12" font-weight="600" letter-spacing="1">gmail_cli.py</text>
    <text x="44" y="158" fill="#bae6fd" font-size="10.5" fill-opacity="0.75">official Gmail API</text>
    <text x="44" y="174" fill="#bae6fd" font-size="10.5" fill-opacity="0.5">no DOM, no scraping</text>
    <text x="44" y="196" fill="#bae6fd" font-size="10.5" fill-opacity="0.5">deterministic</text>

    <text x="44" y="328" fill="#fef08a" font-size="12" font-weight="600" letter-spacing="1">Chrome</text>
    <text x="44" y="346" fill="#fde68a" font-size="10.5" fill-opacity="0.75">browser extension</text>
    <text x="44" y="362" fill="#fde68a" font-size="10.5" fill-opacity="0.5">the airline site,</text>
    <text x="44" y="378" fill="#fde68a" font-size="10.5" fill-opacity="0.5">driven click by click</text>

    <!-- ================= top lane, steps 1-2 ================= -->
    <g>
      <rect x="200" y="126" width="130" height="98" fill="#0f2847" fill-opacity="0.75" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="212" y="146" fill="#7dd3fc" font-size="10" font-weight="600" letter-spacing="1">01</text>
      <text x="212" y="166" fill="#e0f2fe" font-size="12" font-weight="600">search</text>
      <text x="212" y="188" fill="#bae6fd" font-size="10" fill-opacity="0.8">airline booking</text>
      <text x="212" y="203" fill="#bae6fd" font-size="10" fill-opacity="0.8">confirmation</text>
      <text x="212" y="218" fill="#bae6fd" font-size="10" fill-opacity="0.45">gmail query syntax</text>
    </g>
    <line x1="332" y1="175" x2="341" y2="175" stroke="#7dd3fc" stroke-width="1.4" marker-end="url(#ac)"/>
    <g>
      <rect x="343" y="126" width="130" height="98" fill="#0f2847" fill-opacity="0.75" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="355" y="146" fill="#7dd3fc" font-size="10" font-weight="600" letter-spacing="1">02</text>
      <text x="355" y="166" fill="#e0f2fe" font-size="12" font-weight="600">read</text>
      <text x="355" y="188" fill="#bae6fd" font-size="10" fill-opacity="0.8">PNR · ticket no.</text>
      <text x="355" y="203" fill="#bae6fd" font-size="10" fill-opacity="0.8">flight · route</text>
      <text x="355" y="218" fill="#bae6fd" font-size="10" fill-opacity="0.8">scheduled time</text>
    </g>

    <!-- handoff down: 2 -> 3 -->
    <path d="M408 226 L408 262 L555 262 L555 296" fill="none" stroke="#7dd3fc" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ac)"/>
    <rect x="44" y="246" width="330" height="36" fill="#0a1628" stroke="#7dd3fc" stroke-opacity="0.4" stroke-dasharray="3 3"/>
    <text x="58" y="263" fill="#fef08a" font-size="10.5" font-weight="600">the handoff is just text:</text>
    <text x="58" y="277" fill="#bae6fd" font-size="10.5">PNR ······ · LY ···· · ZAG→TLV · 2 pax</text>

    <!-- ================= bottom lane, steps 3-4 ================= -->
    <g>
      <rect x="490" y="314" width="130" height="98" fill="#2a2410" fill-opacity="0.55" stroke="#fef08a" stroke-opacity="0.5"/>
      <text x="502" y="334" fill="#fef08a" font-size="10" font-weight="600" letter-spacing="1">03</text>
      <text x="502" y="354" fill="#fef3c7" font-size="12" font-weight="600">check-in form</text>
      <text x="502" y="376" fill="#fde68a" font-size="10" fill-opacity="0.85">PNR + surname</text>
      <text x="502" y="391" fill="#fde68a" font-size="10" fill-opacity="0.85">both passengers</text>
      <text x="502" y="406" fill="#fde68a" font-size="10" fill-opacity="0.5">selected</text>
    </g>
    <line x1="622" y1="363" x2="631" y2="363" stroke="#fef08a" stroke-width="1.4" marker-end="url(#ay)"/>
    <g>
      <rect x="633" y="314" width="130" height="98" fill="#2a2410" fill-opacity="0.55" stroke="#fef08a" stroke-opacity="0.5"/>
      <text x="645" y="334" fill="#fef08a" font-size="10" font-weight="600" letter-spacing="1">04</text>
      <text x="645" y="354" fill="#fef3c7" font-size="12" font-weight="600">verify · submit</text>
      <text x="645" y="376" fill="#fde68a" font-size="10" fill-opacity="0.85">details vs. docs</text>
      <text x="645" y="391" fill="#fde68a" font-size="10" fill-opacity="0.85">baggage · seats</text>
      <text x="645" y="406" fill="#fde68a" font-size="10" fill-opacity="0.5">→ checked in</text>
    </g>

    <!-- handoff up: 4 -> 5 -->
    <path d="M698 312 L698 276 L845 276 L845 226" fill="none" stroke="#fef08a" stroke-width="1.4" stroke-dasharray="5 4" marker-end="url(#ay)"/>

    <!-- ================= top lane, steps 5-7 ================= -->
    <g>
      <rect x="780" y="126" width="130" height="98" fill="#0f2847" fill-opacity="0.75" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="792" y="146" fill="#7dd3fc" font-size="10" font-weight="600" letter-spacing="1">05</text>
      <text x="792" y="166" fill="#e0f2fe" font-size="12" font-weight="600">search</text>
      <text x="792" y="188" fill="#bae6fd" font-size="10" fill-opacity="0.8">from:WebCheckin</text>
      <text x="792" y="203" fill="#bae6fd" font-size="10" fill-opacity="0.8">newer_than:1h</text>
      <text x="792" y="218" fill="#bae6fd" font-size="10" fill-opacity="0.45">the auto-mail</text>
    </g>
    <line x1="912" y1="175" x2="921" y2="175" stroke="#7dd3fc" stroke-width="1.4" marker-end="url(#ac)"/>
    <g>
      <rect x="923" y="126" width="130" height="98" fill="#0f2847" fill-opacity="0.75" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="935" y="146" fill="#7dd3fc" font-size="10" font-weight="600" letter-spacing="1">06</text>
      <text x="935" y="166" fill="#e0f2fe" font-size="12" font-weight="600">download</text>
      <text x="935" y="188" fill="#bae6fd" font-size="10" fill-opacity="0.8">2 boarding</text>
      <text x="935" y="203" fill="#bae6fd" font-size="10" fill-opacity="0.8">passes → disk</text>
      <text x="935" y="218" fill="#bae6fd" font-size="10" fill-opacity="0.45">as PDFs</text>
    </g>

    <!-- step 7 sits under 06, reached from the findings -->
    <g>
      <rect x="923" y="314" width="249" height="98" fill="#0f2847" fill-opacity="0.75" stroke="#7dd3fc" stroke-opacity="0.55"/>
      <text x="935" y="334" fill="#7dd3fc" font-size="10" font-weight="600" letter-spacing="1">07</text>
      <text x="935" y="354" fill="#e0f2fe" font-size="12" font-weight="600">draft --reply-to-msg</text>
      <text x="935" y="376" fill="#bae6fd" font-size="10" fill-opacity="0.85">note to the airport assistance desk,</text>
      <text x="935" y="391" fill="#bae6fd" font-size="10" fill-opacity="0.85">threaded - and left as a draft.</text>
      <text x="935" y="406" fill="#fef08a" font-size="10" fill-opacity="0.9">a human still hits send.</text>
    </g>
    <path d="M988 226 L988 312" fill="none" stroke="#7dd3fc" stroke-width="1.4" marker-end="url(#ac)"/>

    <!-- ================= findings strip ================= -->
    <line x1="28" y1="462" x2="1172" y2="462" stroke="#7dd3fc" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="28" y="492" fill="#fef08a" font-size="11.5" font-weight="600" letter-spacing="1.4">WHAT THE COMPARISON CAUGHT - the reason to do it this way</text>

    <g>
      <rect x="28" y="508" width="368" height="86" fill="#0f2847" fill-opacity="0.5" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <text x="44" y="532" fill="#e0f2fe" font-size="11.5" font-weight="600">departure time mismatch</text>
      <text x="44" y="552" fill="#bae6fd" font-size="10.5" fill-opacity="0.8">booking email said 23:30.</text>
      <text x="44" y="568" fill="#bae6fd" font-size="10.5" fill-opacity="0.8">check-in system said 23:50.</text>
      <text x="44" y="584" fill="#bae6fd" font-size="10.5" fill-opacity="0.45">two sources, diffed.</text>
    </g>
    <g>
      <rect x="416" y="508" width="368" height="86" fill="#0f2847" fill-opacity="0.5" stroke="#7dd3fc" stroke-opacity="0.35"/>
      <text x="432" y="532" fill="#e0f2fe" font-size="11.5" font-weight="600">one blank seat field</text>
      <text x="432" y="552" fill="#bae6fd" font-size="10.5" fill-opacity="0.8">passenger A got a seat.</text>
      <text x="432" y="568" fill="#bae6fd" font-size="10.5" fill-opacity="0.8">passenger B's pass: empty.</text>
      <text x="432" y="584" fill="#bae6fd" font-size="10.5" fill-opacity="0.45">same booking.</text>
    </g>
    <g>
      <rect x="804" y="508" width="368" height="86" fill="#0f2847" fill-opacity="0.5" stroke="#fef08a" stroke-opacity="0.4"/>
      <text x="820" y="532" fill="#fef3c7" font-size="11.5" font-weight="600">no wheelchair flag on the pass</text>
      <text x="820" y="552" fill="#fde68a" font-size="10.5" fill-opacity="0.8">assistance was booked. it did not</text>
      <text x="820" y="568" fill="#fde68a" font-size="10.5" fill-opacity="0.8">show up on the boarding pass.</text>
      <text x="820" y="584" fill="#fde68a" font-size="10.5" fill-opacity="0.6">found the day before, not at the gate.</text>
    </g>

    <text x="1172" y="618" fill="#bae6fd" fill-opacity="0.4" font-size="10" text-anchor="end">gal.tidhar.org.il  ·  github.com/tatarco/gmail-skill</text>
  </g>
</svg>
